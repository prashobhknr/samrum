version: '3.8'

# Docker Compose for UAT & Production Deployment
# Usage:
#   UAT: docker-compose up -d
#   Prod: docker stack deploy -c docker-compose.yml doorman

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: doorman-postgres
    environment:
      POSTGRES_DB: doorman_db
      POSTGRES_USER: doorman_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doorman_user -d doorman_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doorman-network
    restart: unless-stopped

  # Backend API
  backend:
    image: doorman-backend:latest
    container_name: doorman-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://doorman_user:${DB_PASSWORD}@postgres:5432/doorman_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 1h
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRE: 7d
      CAMUNDA_URL: http://camunda:8080
      LOG_LEVEL: info
      CORS_ORIGIN: http://localhost:3000,http://doorman.example.com,https://doorman.example.com
      SESSION_TIMEOUT: 3600
      MAX_LOGIN_ATTEMPTS: 5
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      camunda:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - doorman-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend UI
  frontend:
    image: doorman-frontend:latest
    container_name: doorman-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3001}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - doorman-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Camunda Process Engine
  camunda:
    image: camunda/camunda-bpm-platform:7.17-latest
    container_name: doorman-camunda
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/doorman_db
      DB_USERNAME: doorman_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_VALIDATE_ON_BORROW: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./processes:/app/processes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/camunda"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - doorman-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: doorman-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - doorman-network
    restart: unless-stopped

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: doorman-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    networks:
      - doorman-network
    restart: unless-stopped

  # Loki Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: doorman-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - doorman-network
    restart: unless-stopped

  # Redis Cache (Optional - for sessions/caching)
  redis:
    image: redis:7-alpine
    container_name: doorman-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doorman-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  doorman-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  redis_data:
    driver: local
