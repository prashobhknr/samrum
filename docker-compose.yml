version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: doorman-postgres
    environment:
      POSTGRES_USER: doorman_user
      POSTGRES_PASSWORD: doorman_pass
      POSTGRES_DB: doorman_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doorman_user -d doorman_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doorman-network

  # pgAdmin - PostgreSQL Management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: doorman-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@doorman.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - doorman-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # Express.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doorman-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://doorman_user:doorman_pass@postgres:5432/doorman_db
      API_PORT: 3000
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    command: npm run dev
    networks:
      - doorman-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  pgadmin_data:

networks:
  doorman-network:
    driver: bridge
